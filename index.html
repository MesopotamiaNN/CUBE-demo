<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Cube Studios | استوديو الألعاب والبرامج والأجهزة</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700;900&family=Orbitron:wght@400;500;700;900&family=Noto+Sans+Cuneiform&display=swap" rel="stylesheet">
    <script type="importmap">
        {
            "imports": {
                "three": "https://unpkg.com/three@0.160.0/build/three.module.js",
                "three/addons/": "https://unpkg.com/three@0.160.0/examples/jsm/"
            }
        }
    </script>
    <style>
        :root {
            --bg: #050510; --p: #7c3aed; --pg: #a78bfa; --s: #06b6d4; --sg: #22d3ee;
            --t1: #f8fafc; --t2: #cbd5e1; --t3: #94a3b8;
            --glass: rgba(15, 15, 40, 0.6); --gborder: rgba(255, 255, 255, 0.1);
            --font: 'Cairo', sans-serif; --font2: 'Orbitron', monospace; --font3: 'Noto Sans Cuneiform', sans-serif;
            --mh: 80px; --ease: cubic-bezier(0.16, 1, 0.3, 1); --spring: cubic-bezier(0.34, 1.56, 0.64, 1);
            --gold: #d4a017; --gold2: #f0c75e; --meso-bg: #1a0f00;
        }
        *,
        *::before,
        *::after {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        html {
            font-size: 16px;
            -webkit-tap-highlight-color: transparent;
            -webkit-font-smoothing: antialiased;
        }
        body {
            font-family: var(--font);
            background: #000;
            color: var(--t1);
            overflow: hidden;
            height: 100dvh;
            width: 100vw;
            position: fixed;
            touch-action: pan-x pan-y;
            -webkit-user-select: none;
            user-select: none;
            transition: background 1.5s ease;
        }
        body.meso {
            background: var(--meso-bg);
        }
        #c {
            position: fixed;
            inset: 0;
            z-index: 1;
            transition: all 0.8s var(--spring);
        }
        #c.shifted {
            transform: translateX(25%);
        }
        #cc {
            display: block;
            width: 100%;
            height: 100%;
        }
        #load {
            position: fixed;
            inset: 0;
            z-index: 1000;
            background: #000;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            transition: opacity 0.8s, visibility 0.8s;
        }
        #load.hid {
            opacity: 0;
            visibility: hidden;
        }
        .lc {
            width: 80px;
            height: 80px;
            perspective: 200px;
            margin-bottom: 2rem;
        }
        .mc {
            width: 100%;
            height: 100%;
            position: relative;
            transform-style: preserve-3d;
            animation: cs 2s infinite linear;
        }
        .mc .f {
            position: absolute;
            width: 80px;
            height: 80px;
            border: 2px solid var(--pg);
            background: rgba(255, 255, 255, 0.2);
            box-shadow: 0 0 20px rgba(124, 58, 237, 0.3), inset 0 0 20px rgba(255, 255, 255, 0.2);
        }
        .mc .fr {
            transform: translateZ(40px);
        }
        .mc .bk {
            transform: rotateY(180deg) translateZ(40px);
        }
        .mc .rt {
            transform: rotateY(90deg) translateZ(40px);
        }
        .mc .lt {
            transform: rotateY(-90deg) translateZ(40px);
        }
        .mc .tp {
            transform: rotateX(90deg) translateZ(40px);
        }
        .mc .bm {
            transform: rotateX(-90deg) translateZ(40px);
        }
        @keyframes cs {
            0% {
                transform: rotateX(-20deg) rotateY(0);
            }
            100% {
                transform: rotateX(-20deg) rotateY(360deg);
            }
        }
        .ltx {
            font-family: var(--font2);
            font-size: 1.8rem;
            font-weight: 700;
            letter-spacing: 0.3em;
            margin-bottom: 1.5rem;
        }
        .ltx span {
            color: var(--pg);
        }
        .lbar {
            width: 200px;
            height: 3px;
            background: rgba(255, 255, 255, 0.1);
            border-radius: 3px;
            overflow: hidden;
        }
        .lprog {
            height: 100%;
            width: 0;
            background: linear-gradient(90deg, var(--p), var(--s));
            border-radius: 3px;
            animation: lp 2.5s var(--ease) forwards;
        }
        @keyframes lp {
            0% {
                width: 0;
            }
            50% {
                width: 70%;
            }
            100% {
                width: 100%;
            }
        }
        #glow {
            position: fixed;
            width: 200px;
            height: 200px;
            border-radius: 50%;
            background: radial-gradient(circle, rgba(124, 58, 237, 0.15) 0%, transparent 70%);
            pointer-events: none;
            z-index: 50;
            transform: translate(-50%, -50%);
            opacity: 0;
            display: none;
        }
        @media(min-width:768px) {
            #glow {
                display: block;
            }
        }
        #dn {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            z-index: 100;
            display: none;
            align-items: center;
            justify-content: space-between;
            padding: 1rem 2rem;
            background: linear-gradient(180deg, rgba(5, 5, 16, 0.95) 0%, rgba(5, 5, 16, 0) 100%);
            backdrop-filter: blur(10px);
        }
        .nb {
            font-family: var(--font2);
            font-size: 1.2rem;
            font-weight: 700;
            letter-spacing: 0.15em;
            display: flex;
            align-items: center;
            gap: 0.5rem;
        }
        .ci {
            font-size: 1.5rem;
            color: var(--pg);
            animation: ip 2s ease-in-out infinite;
        }
        @keyframes ip {
            0%,
            100% {
                opacity: 0.7;
                transform: scale(1);
            }
            50% {
                opacity: 1;
                transform: scale(1.1);
            }
        }
        .nh {
            color: var(--pg);
        }
        .nav-right {
            display: flex;
            align-items: center;
            gap: 0.5rem;
        }
        .nl {
            list-style: none;
            display: flex;
            gap: 0.25rem;
        }
        .nl a {
            font-size: 0.9rem;
            font-weight: 500;
            color: var(--t2);
            text-decoration: none;
            padding: 0.5rem 1rem;
            border-radius: 8px;
            transition: all 0.3s var(--ease);
            position: relative;
        }
        .nl a:hover,
        .nl a.ac {
            color: var(--t1);
            background: rgba(124, 58, 237, 0.15);
        }
        .nl a.ac::after {
            content: '';
            position: absolute;
            bottom: 0;
            left: 50%;
            transform: translateX(-50%);
            width: 20px;
            height: 2px;
            background: var(--pg);
            border-radius: 1px;
        }
        .top-btns {
            position: fixed;
            top: 1rem;
            left: 1rem;
            z-index: 300;
            display: flex;
            gap: 0.5rem;
        }
        #lt {
            background: rgba(124, 58, 237, 0.3);
            border: 1px solid rgba(255, 255, 255, 0.2);
            color: #fff;
            padding: 0.5rem 1rem;
            border-radius: 20px;
            cursor: pointer;
            font-family: var(--font2);
            font-size: 0.8rem;
            backdrop-filter: blur(10px);
            transition: all 0.3s;
        }
        #lt:hover {
            background: rgba(124, 58, 237, 0.5);
        }
        #meso-btn {
            background: linear-gradient(135deg, #d4a017, #8b6914);
            border: 1px solid rgba(212, 160, 23, 0.5);
            color: #1a0f00;
            padding: 0.5rem 1rem;
            border-radius: 20px;
            cursor: pointer;
            font-family: var(--font);
            font-size: 0.75rem;
            font-weight: 700;
            backdrop-filter: blur(10px);
            transition: all 0.3s;
            animation: gpulse 2s infinite;
            white-space: nowrap;
        }
        @keyframes gpulse {
            0%,
            100% {
                box-shadow: 0 0 15px rgba(212, 160, 23, 0.3);
            }
            50% {
                box-shadow: 0 0 30px rgba(240, 199, 94, 0.6);
            }
        }
        #meso-btn:hover {
            background: linear-gradient(135deg, #f0c75e, #d4a017);
            transform: scale(1.05);
        }
        #meso-btn.active {
            background: linear-gradient(135deg, #7c3aed, #06b6d4);
            border-color: rgba(124, 58, 237, 0.5);
            color: #fff;
            animation: none;
        }
        #mb {
            position: fixed;
            bottom: 0;
            left: 0;
            right: 0;
            z-index: 100;
            display: flex;
            justify-content: space-around;
            align-items: center;
            padding: 0.75rem 0.5rem;
            padding-bottom: max(0.75rem, env(safe-area-inset-bottom));
            background: linear-gradient(0deg, rgba(5, 5, 16, 0.95) 0%, rgba(5, 5, 16, 0.7) 80%, transparent 100%);
            backdrop-filter: blur(10px);
            height: var(--mh);
        }
        .mbb {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 0.25rem;
            background: none;
            border: none;
            color: var(--t3);
            cursor: pointer;
            padding: 0.5rem;
            border-radius: 12px;
            transition: all 0.3s var(--ease);
            min-width: 56px;
            animation: fiu 0.6s var(--spring) both;
            -webkit-tap-highlight-color: transparent;
        }
        .mbb:nth-child(1) {
            animation-delay: 0s;
        }
        .mbb:nth-child(2) {
            animation-delay: 0.1s;
        }
        .mbb:nth-child(3) {
            animation-delay: 0.2s;
        }
        .mbb:nth-child(4) {
            animation-delay: 0.3s;
        }
        .mbb:nth-child(5) {
            animation-delay: 0.4s;
        }
        .mbb:nth-child(6) {
            animation-delay: 0.5s;
        }
        @keyframes fiu {
            from {
                opacity: 0;
                transform: translateY(20px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }
        .mbb:active {
            transform: scale(0.9);
        }
        .mbb.ac {
            color: var(--pg);
            background: rgba(124, 58, 237, 0.2);
        }
        .mbb .bi {
            font-size: 1.3rem;
        }
        .mbb .bl {
            font-size: 0.65rem;
            font-weight: 500;
        }
        #pn {
            position: fixed;
            z-index: 200;
            background: var(--glass);
            border: 1px solid var(--gborder);
            border-radius: 20px;
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            padding: 2rem;
            color: var(--t1);
            opacity: 0;
            visibility: hidden;
            transform: scale(0.9) translateY(20px);
            transition: all 0.6s var(--spring);
            pointer-events: none;
            max-height: 70vh;
            overflow-y: auto;
        }
        #pn.vis {
            opacity: 1;
            visibility: visible;
            transform: scale(1) translateY(0);
            pointer-events: all;
        }
        #cp {
            position: absolute;
            top: 1rem;
            left: 1rem;
            background: rgba(255, 255, 255, 0.1);
            border: 1px solid rgba(255, 255, 255, 0.2);
            color: var(--t1);
            width: 36px;
            height: 36px;
            border-radius: 50%;
            cursor: pointer;
            font-size: 1rem;
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 10;
        }
        #cp:hover {
            background: rgba(255, 255, 255, 0.2);
        }
        #wa {
            position: fixed;
            bottom: calc(var(--mh) + 1.5rem);
            right: 1.5rem;
            z-index: 300;
            width: 55px;
            height: 55px;
            border-radius: 50%;
            background: #25D366;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            box-shadow: 0 4px 20px rgba(37, 211, 102, 0.4);
            transition: all 0.3s var(--spring);
            animation: wpulse 2s infinite;
        }
        @keyframes wpulse {
            0%,
            100% {
                box-shadow: 0 4px 20px rgba(37, 211, 102, 0.4);
            }
            50% {
                box-shadow: 0 4px 35px rgba(37, 211, 102, 0.7);
            }
        }
        #wa:hover {
            transform: scale(1.1);
        }
        #wa svg {
            width: 28px;
            height: 28px;
            fill: #fff;
        }
        .pi {
            text-align: center;
        }
        .pic {
            font-size: 3rem;
            margin-bottom: 0.5rem;
            animation: float 3s ease-in-out infinite;
        }
        @keyframes float {
            0%,
            100% {
                transform: translateY(0);
            }
            50% {
                transform: translateY(-10px);
            }
        }
        .pt {
            font-family: var(--font2);
            font-size: 1.5rem;
            font-weight: 700;
            color: var(--pg);
            margin-bottom: 0.25rem;
        }
        .ps {
            font-size: 0.9rem;
            color: var(--t3);
            margin-bottom: 1rem;
        }
        .pd {
            font-size: 0.85rem;
            color: var(--t2);
            line-height: 1.6;
            margin-bottom: 1rem;
        }
        .pst {
            display: flex;
            justify-content: center;
            gap: 1.5rem;
            margin: 1rem 0;
        }
        .st {
            text-align: center;
        }
        .sn {
            display: block;
            font-family: var(--font2);
            font-size: 1.5rem;
            font-weight: 700;
            color: var(--sg);
        }
        .sl {
            font-size: 0.7rem;
            color: var(--t3);
        }
        .pbtn {
            display: inline-block;
            background: linear-gradient(135deg, var(--p), var(--s));
            color: #fff;
            text-decoration: none;
            padding: 0.6rem 1.5rem;
            border-radius: 25px;
            font-size: 0.85rem;
            font-weight: 600;
            margin-top: 1rem;
            border: none;
            cursor: pointer;
            transition: all 0.3s;
        }
        .pbtn:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 20px rgba(124, 58, 237, 0.4);
        }
        .card-list {
            margin: 1rem 0;
        }
        .card-i {
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid rgba(255, 255, 255, 0.08);
            border-radius: 12px;
            padding: 0.75rem;
            margin-bottom: 0.5rem;
            text-align: right;
            transition: all 0.3s var(--ease);
            animation: fiu 0.5s var(--spring) both;
        }
        .card-i:nth-child(1) {
            animation-delay: 0.1s;
        }
        .card-i:nth-child(2) {
            animation-delay: 0.2s;
        }
        .card-i:nth-child(3) {
            animation-delay: 0.3s;
        }
        .card-i:hover {
            background: rgba(124, 58, 237, 0.08);
            border-color: rgba(124, 58, 237, 0.3);
            transform: translateX(-5px);
        }
        .card-img {
            width: 60px;
            height: 60px;
            border-radius: 8px;
            object-fit: cover;
            float: right;
            margin-left: 0.75rem;
        }
        .card-info h3 {
            font-size: 0.9rem;
            color: var(--t1);
        }
        .card-info p {
            font-size: 0.7rem;
            color: var(--t3);
        }
        .card-tag {
            display: inline-block;
            background: var(--p);
            color: #fff;
            padding: 0.2rem 0.5rem;
            border-radius: 10px;
            font-size: 0.65rem;
            margin-top: 0.3rem;
        }
        .sg {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 0.5rem;
            margin: 1rem 0;
        }
        .sc {
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid rgba(255, 255, 255, 0.08);
            border-radius: 12px;
            padding: 0.75rem;
            text-align: center;
            transition: all 0.3s var(--ease);
            animation: fiu 0.5s var(--spring) both;
        }
        .sc:nth-child(1) {
            animation-delay: 0s;
        }
        .sc:nth-child(2) {
            animation-delay: 0.1s;
        }
        .sc:nth-child(3) {
            animation-delay: 0.2s;
        }
        .sc:nth-child(4) {
            animation-delay: 0.3s;
        }
        .sc:nth-child(5) {
            animation-delay: 0.4s;
        }
        .sc:nth-child(6) {
            animation-delay: 0.5s;
        }
        .sc:hover {
            background: rgba(124, 58, 237, 0.08);
            border-color: rgba(124, 58, 237, 0.3);
            transform: translateY(-3px);
        }
        .sic {
            font-size: 2rem;
            margin-bottom: 0.3rem;
        }
        .sc h3 {
            font-size: 0.8rem;
            color: var(--t1);
        }
        .sc p {
            font-size: 0.65rem;
            color: var(--t3);
        }
        .vals {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 0.5rem;
            margin: 1rem 0;
        }
        .val {
            background: rgba(124, 58, 237, 0.1);
            border-radius: 10px;
            padding: 0.5rem;
            font-size: 0.8rem;
            text-align: center;
            animation: fiu 0.5s var(--spring) both;
        }
        .val:nth-child(1) {
            animation-delay: 0s;
        }
        .val:nth-child(2) {
            animation-delay: 0.1s;
        }
        .val:nth-child(3) {
            animation-delay: 0.2s;
        }
        .val:nth-child(4) {
            animation-delay: 0.3s;
        }
        .val span {
            display: block;
            font-size: 1.5rem;
            margin-bottom: 0.25rem;
        }
        .cf {
            margin: 1rem 0;
        }
        .fg {
            margin-bottom: 0.75rem;
        }
        .fg input,
        .fg select,
        .fg textarea {
            width: 100%;
            padding: 0.6rem 0.75rem;
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.15);
            border-radius: 10px;
            color: var(--t1);
            font-family: var(--font);
            font-size: 0.8rem;
        }
        .fg textarea {
            resize: vertical;
        }
        .sbtn {
            width: 100%;
        }
        .clinks {
            display: flex;
            flex-wrap: wrap;
            gap: 0.5rem;
            justify-content: center;
            margin-top: 1rem;
        }
        .clink {
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.1);
            color: var(--t2);
            text-decoration: none;
            padding: 0.4rem 0.8rem;
            border-radius: 20px;
            font-size: 0.75rem;
            transition: all 0.3s;
        }
        .clink:hover {
            background: rgba(124, 58, 237, 0.3);
            color: #fff;
        }
        .logo-img {
            width: 80px;
            height: 80px;
            object-fit: contain;
            margin-bottom: 1rem;
            animation: float 3s ease-in-out infinite;
        }
        .pft {
            font-size: 0.75rem;
            color: var(--t3);
            margin-top: 1rem;
        }
        .cuneiform-bg {
            position: fixed;
            inset: 0;
            z-index: 0;
            pointer-events: none;
            opacity: 0;
            transition: opacity 1.5s ease;
            font-family: var(--font3);
            font-size: 2rem;
            color: rgba(212, 160, 23, 0.08);
            display: grid;
            grid-template-columns: repeat(6, 1fr);
            align-items: center;
            justify-items: center;
            padding: 2rem;
        }
        .cuneiform-bg.vis {
            opacity: 1;
        }
        @media(max-width:374px) {
            #mb {
                padding: 0.5rem 0.25rem;
                height: 70px;
            }
            .mbb {
                padding: 0.3rem;
                min-width: 44px;
            }
            .mbb .bi {
                font-size: 1.1rem;
            }
            .mbb .bl {
                font-size: 0.55rem;
            }
            #pn {
                padding: 1.5rem;
                margin: 0.75rem;
                border-radius: 16px;
                max-height: 60vh;
            }
            .top-btns {
                top: 0.5rem;
                left: 0.5rem;
                gap: 0.3rem;
            }
            #lt,
            #meso-btn {
                font-size: 0.65rem;
                padding: 0.35rem 0.6rem;
            }
        }
        @media(min-width:375px) and (max-width:767px) {
            #dn {
                display: none;
            }
            #mb {
                display: flex;
            }
            #pn {
                position: fixed;
                bottom: calc(var(--mh) + 1rem);
                left: 1rem;
                right: 1rem;
                width: auto;
                max-height: 50vh;
            }
            #wa {
                bottom: calc(var(--mh) + 1.5rem);
            }
            .top-btns {
                top: 0.75rem;
                left: 0.75rem;
            }
        }
        @media(min-width:768px) and (max-width:1023px) {
            #dn {
                display: flex;
                padding: 1rem 1.5rem;
            }
            #mb {
                display: none;
            }
            .nl a {
                font-size: 0.8rem;
                padding: 0.4rem 0.75rem;
            }
            #pn {
                position: fixed;
                left: 2rem;
                bottom: 2rem;
                width: 380px;
                max-height: 60vh;
            }
            #wa {
                bottom: 2rem;
            }
            #c.shifted {
                transform: translateX(20%);
            }
            .top-btns {
                top: 1rem;
                left: 1rem;
            }
        }
        @media(min-width:1024px) {
            #dn {
                display: flex;
                padding: 1.5rem 3rem;
            }
            #mb {
                display: none;
            }
            #pn {
                position: fixed;
                left: 3rem;
                bottom: 3rem;
                width: 420px;
                max-height: 65vh;
            }
            #wa {
                bottom: 3rem;
            }
            #c.shifted {
                transform: translateX(22%);
            }
        }
        @media(min-width:1440px) {
            #dn {
                padding: 2rem 5rem;
            }
            #pn {

        function sf(freq, type = 'sine', dur = 0.1) {
            if (!ac) return;
            const o = ac.createOscillator();
            const g = ac.createGain();
            o.connect(g);
            g.connect(ac.destination);
            o.type = type;
            o.frequency.setValueAtTime(freq, ac.currentTime);
            o.frequency.exponentialRampToValueAtTime(freq * 0.5, ac.currentTime + dur);
            g.gain.setValueAtTime(0.3, ac.currentTime);
            g.gain.exponentialRampToValueAtTime(0.01, ac.currentTime + dur);
            o.start(ac.currentTime);
            o.stop(ac.currentTime + dur);
        }

        function sw() {
            if (!ac) return;
            const bs = ac.sampleRate * 0.3;
            const b = ac.createBuffer(1, bs, ac.sampleRate);
            const d = b.getChannelData(0);
            for (let i = 0; i < bs; i++) d[i] = (Math.random() * 2 - 1) * Math.exp(-i / (bs * 0.3)) * 0.15;
            const s = ac.createBufferSource();
            s.buffer = b;
            const f = ac.createBiquadFilter();
            f.type = 'bandpass';
            f.frequency.value = 600;
            s.connect(f);
            f.connect(ac.destination);
            s.start();
        }

        function vb(dur = 50) { if (navigator.vibrate) navigator.vibrate(dur); }

        const rc = 1500;
        const rg = new THREE.BufferGeometry();
        const rp = new Float32Array(rc * 3);
        const rd = [];
        for (let i = 0; i < rc; i++) { rp[i * 3] = (Math.random() - 0.5) * 20;
            rp[i * 3 + 1] = Math.random() * 15;
            rp[i * 3 + 2] = (Math.random() - 0.5) * 15;
            rd.push({ speed: 0.02 + Math.random() * 0.08, baseX: rp[i * 3], baseZ: rp[i * 3 + 2] }); }
        rg.setAttribute('position', new THREE.BufferAttribute(rp, 3));
        const rain = new THREE.Points(rg, new THREE.PointsMaterial({ color: 0xa78bfa, size: 0.03, transparent: true, opacity: 0.5,
            blending: THREE.AdditiveBlending, depthWrite: false }));

        rain.name = 'rain';
        scene.add(rain);

        const wg = new THREE.Group();
        for (let i = 0; i < 5; i++) {
            const ring = new THREE.Mesh(new THREE.TorusGeometry(1.5 + i * 0.5, 0.01, 16, 100), new THREE
        .MeshBasicMaterial({ color: 0x7c3aed, transparent: true, opacity: 0.4 - i * 0.07, depthTest: false,
                depthWrite: false }));
            ring.rotation.x = -Math.PI / 2;
            ring.position.y = -2.5;
            ring.userData = { baseScale: 1, phase: i * 0.7, speed: 0.3 + i * 0.1 };
            wg.add(ring);
        }
        wg.name = 'waves';
        scene.add(wg);

        function createRubiksCube() {
            const group = new THREE.Group();
            const size = 2.4;
            const subSize = size / 3;

            const whiteGlass = new THREE.MeshPhysicalMaterial({
                color: 0xffffff,
                roughness: 0.12,
                metalness: 0.02,
                transparent: true,
                opacity: 0.5,
                clearcoat: 0.4,
                clearcoatRoughness: 0.15,
                envMapIntensity: 0.5
            });

            for (let x = -1; x <= 1; x++) {
                for (let y = -1; y <= 1; y++) {
                    for (let z = -1; z <= 1; z++) {
                        const geo = new THREE.BoxGeometry(subSize * 0.9, subSize * 0.9, subSize * 0.9);
                        const cubelet = new THREE.Mesh(geo, whiteGlass.clone());
                        cubelet.position.set(x * subSize, y * subSize, z * subSize);
                        const egeo = new THREE.EdgesGeometry(geo);
                        const edge = new THREE.LineSegments(egeo, new THREE.LineBasicMaterial({ color: 0x000000,
                            linewidth: 2, transparent: true, opacity: 0.85 }));
                        cubelet.add(edge);
                        group.add(cubelet);
                    }
                }
            }

            const faces = [
                { ar: 'الرئيسية', en: 'HOME', icon: '🏠', color: '#7c3aed' },
                { ar: 'الألعاب', en: 'GAMES', icon: '🎮', color: '#06b6d4' },
                { ar: 'الأجهزة', en: 'HARDWARE', icon: '📱', color: '#22d3ee' },
                { ar: 'الخدمات', en: 'SERVICES', icon: '⚙️', color: '#8b5cf6' },
                { ar: 'عن الشركة', en: 'ABOUT', icon: '⬡', color: '#a78bfa' },
                { ar: 'اتصل بنا', en: 'CONTACT', icon: '📧', color: '#f0abfc' }
            ];
            const labelSize = size * 0.85;
            const labelOffset = size / 2 + 0.15;

            faces.forEach((f, i) => {
                const c = document.createElement('canvas');
                c.width = 1024;
                c.height = 1024;
                const ctx = c.getContext('2d');
                ctx.clearRect(0, 0, 1024, 1024);
                ctx.fillStyle = f.color;
                ctx.font = 'bold 140px Cairo, Arial';
                ctx.textAlign = 'center';
                ctx.fillText(f.icon, 512, 380);
                ctx.fillStyle = '#ffffff';
                ctx.font = 'bold 100px Cairo, Arial';
                ctx.fillText(f.ar, 512, 560);
                ctx.fillStyle = f.color;
                ctx.font = 'bold 50px Orbitron, monospace';
                ctx.fillText(f.en, 512, 680);
                const tex = new THREE.CanvasTexture(c);
                tex.colorSpace = THREE.SRGBColorSpace;
                tex.minFilter = THREE.LinearFilter;
                tex.magFilter = THREE.LinearFilter;
                const labelMat = new THREE.MeshBasicMaterial({ map: tex, transparent: true, opacity: 0.9, depthTest: false,
                    depthWrite: false, side: THREE.DoubleSide });
                const labelPlane = new THREE.Mesh(new THREE.PlaneGeometry(labelSize, labelSize), labelMat);
                labelPlane.renderOrder = 1;
                labelPlane.material.depthTest = false;
                labelPlane.material.depthWrite = false;
                switch (i) {
                    case 0:
                        labelPlane.position.z = labelOffset;
                        break;
                    case 1:
                        labelPlane.position.x = labelOffset;
                        labelPlane.rotation.y = Math.PI / 2;
                        break;
                    case 2:
                        labelPlane.position.z = -labelOffset;
                        labelPlane.rotation.y = Math.PI;
                        break;
                    case 3:
                        labelPlane.position.x = -labelOffset;
                        labelPlane.rotation.y = -Math.PI / 2;
                        break;
                    case 4:
                        labelPlane.position.y = labelOffset;
                        labelPlane.rotation.x = -Math.PI / 2;
                        break;
                    case 5:
                        labelPlane.position.y = -labelOffset;
                        labelPlane.rotation.x = Math.PI / 2;
                        break;
                }
                group.add(labelPlane);
            });

            const outerGeo = new THREE.EdgesGeometry(new THREE.BoxGeometry(size + 0.2, size + 0.2, size + 0.2));
            const outerEdge = new THREE.LineSegments(outerGeo, new THREE.LineBasicMaterial({ color: 0xffffff, transparent: true,
                opacity: 0.3, linewidth: 1 }));
            group.add(outerEdge);

            const corners = [
                [-size / 2, -size / 2, -size / 2],
                [size / 2, -size / 2, -size / 2],
                [-size / 2, size / 2, -size / 2],
                [size / 2, size / 2, -size / 2],
                [-size / 2, -size / 2, size / 2],
                [size / 2, -size / 2, size / 2],
                [-size / 2, size / 2, size / 2],
                [size / 2, size / 2, size / 2]
            ];
            corners.forEach(([x, y, z]) => {
                const g = new THREE.Mesh(new THREE.SphereGeometry(0.08, 8, 8), new THREE.MeshBasicMaterial({ color: 0xc4b5fd,
                    transparent: true, opacity: 0.9 }));
                g.position.set(x, y, z);
                group.add(g);
            });

            group.userData = { cornerGlows: group.children.filter(c => c.geometry?.type === 'SphereGeometry'), outerEdge };
            return group;
        }

        function createParticles() {
            const group = new THREE.Group();
            const oc = 3000,
                og = new THREE.BufferGeometry(),
                op = new Float32Array(oc * 3),
                ocl = new Float32Array(oc * 3),
                od = [];
            for (let i = 0; i < oc; i++) {
                const a = Math.random() * Math.PI * 2,
                    r = 1.8 + Math.random() * 2.5,
                    h = (Math.random() - 0.5) * 4;
                op[i * 3] = Math.cos(a) * r;
                op[i * 3 + 1] = h;
                op[i * 3 + 2] = Math.sin(a) * r;
                const m = Math.random();
                ocl[i * 3] = 0.3 + m * 0.2;
                ocl[i * 3 + 1] = 0.1 + m * 0.5;
                ocl[i * 3 + 2] = 0.6 + m * 0.4;
                od.push({ a, r, h, speed: 0.1 + Math.random() * 0.4, vs: (Math.random() - 0.5) * 0.3 });
            }
            og.setAttribute('position', new THREE.BufferAttribute(op, 3));
            og.setAttribute('color', new THREE.BufferAttribute(ocl, 3));
            const oPts = new THREE.Points(og, new THREE.PointsMaterial({ size: 0.03, vertexColors: true,
                blending: THREE.AdditiveBlending, depthWrite: false, transparent: true, opacity: 0.7 }));
            oPts.userData = { data: od, pos: op, type: 'orbital' };
            group.add(oPts);

            const cc2 = 500,
                cg = new THREE.BufferGeometry(),
                cp2 = new Float32Array(cc2 * 3),
                ccl = new Float32Array(cc2 * 3),
                cd = [];
            for (let i = 0; i < cc2; i++) {
                const th = Math.random() * Math.PI * 2,
                    ph = Math.acos(2 * Math.random() - 1),
                    rad = Math.random() * 1.0;
                cp2[i * 3] = Math.sin(ph) * Math.cos(th) * rad;
                cp2[i * 3 + 1] = Math.sin(ph) * Math.sin(th) * rad;
                cp2[i * 3 + 2] = Math.cos(ph) * rad;
                ccl[i * 3] = 0.8;
                ccl[i * 3 + 1] = 0.7;
                ccl[i * 3 + 2] = 1.0;
                cd.push({ bx: cp2[i * 3], by: cp2[i * 3 + 1], bz: cp2[i * 3 + 2], phase: Math.random() * Math.PI * 2,
                    speed: 0.3 + Math.random() * 0.7, amp: 0.05 + Math.random() * 0.15 });
            }
            cg.setAttribute('position', new THREE.BufferAttribute(cp2, 3));
            cg.setAttribute('color', new THREE.BufferAttribute(ccl, 3));
            const cPts = new THREE.Points(cg, new THREE.PointsMaterial({ size: 0.05, vertexColors: true,
                blending: THREE.AdditiveBlending, depthWrite: false, depthTest: false, transparent: true, opacity: 0.9 }));
            cPts.userData = { data: cd, pos: cp2, type: 'core' };
            group.add(cPts);

            const lc2 = 50,
                lg = new THREE.BufferGeometry(),
                lp = new Float32Array(lc2 * 6);
            for (let i = 0; i < lc2; i++) {
                const a1 = Math.random() * Math.PI * 2,
                    a2 = a1 + (Math.random() - 0.5) * 1.5,
                    r = 1.5 + Math.random() * 2;
                lp[i * 6] = Math.cos(a1) * r;
                lp[i * 6 + 1] = (Math.random() - 0.5) * 3;
                lp[i * 6 + 2] = Math.sin(a1) * r;
                lp[i * 6 + 3] = Math.cos(a2) * r;
                lp[i * 6 + 4] = (Math.random() - 0.5) * 3;
                lp[i * 6 + 5] = Math.sin(a2) * r;
            }
            lg.setAttribute('position', new THREE.BufferAttribute(lp, 3));
            const lLines = new THREE.LineSegments(lg, new THREE.LineBasicMaterial({ color: 0x7c3aed, transparent: true,
                opacity: 0.15, blending: THREE.AdditiveBlending, depthWrite: false, depthTest: false }));
            lLines.userData = { pos: lp, type: 'lines' };
            group.add(lLines);

            const boltGroup = new THREE.Group();
            boltGroup.visible = false;
            boltGroup.userData = { type: 'bolt', active: false, startTime: 0 };
            group.add(boltGroup);

            const burstG = new THREE.Group();
            burstG.visible = false;
            burstG.userData = { type: 'burst', active: false, startTime: 0 };
            group.add(burstG);

            group.userData.update = function(time) {
                const t = time * 0.001;
                if (oPts.userData.type === 'orbital') {
                    const d = oPts.userData.data,
                        p = oPts.userData.pos;
                    for (let i = 0; i < d.length; i++) { d[i].a += d[i].speed * 0.005;
                        d[i].h += Math.sin(t + d[i].vs) * 0.002; if (Math.abs(d[i].h) > 2.5) d[i].vs *= -1;
                        p[i * 3] = Math.cos(d[i].a) * d[i].r;
                        p[i * 3 + 1] = d[i].h;
                        p[i * 3 + 2] = Math.sin(d[i].a) * d[i].r; }
                    oPts.geometry.attributes.position.needsUpdate = true;
                }
                if (cPts.userData.type === 'core') {
                    const d = cPts.userData.data,
                        p = cPts.userData.pos;
                    for (let i = 0; i < d.length; i++) { const w = Math.sin(t * d[i].speed + d[i].phase) * d[i].amp;
                        p[i * 3] = d[i].bx + w;
                        p[i * 3 + 1] = d[i].by + w * 1.3;
                        p[i * 3 + 2] = d[i].bz + w * 0.7; }
                    cPts.geometry.attributes.position.needsUpdate = true;
                }
                if (lLines.userData.type === 'lines') lLines.material.opacity = 0.1 + Math.sin(t * 0.7) * 0.05;
                if (boltGroup.userData.active) {
                    if (t - boltGroup.userData.startTime > 0.4) { boltGroup.visible = false;
                        boltGroup.userData.active = false;
                        boltGroup.clear(); } else boltGroup.children.forEach(l => { l.material.opacity = Math.max(0, l
                            .material.opacity - 0.05); });
                }
                if (burstG.userData.active) {
                    if (t - burstG.userData.startTime > 2) { burstG.visible = false;
                        burstG.userData.active = false;
                        burstG.clear(); } else burstG.children.forEach(p => { p.position.x += p.userData.vx * 0.03;
                        p.position.y += p.userData.vy * 0.03;
                        p.position.z += p.userData.vz * 0.03;
                        p.material.opacity = Math.max(0, p.material.opacity - 0.01); });
                }
            };

            group.userData.createBolt = function(p1, p2) {
                const bg = group.children.find(c => c.userData?.type === 'bolt');
                if (!bg) return;
                bg.clear();
                bg.visible = true;
                bg.userData.active = true;
                bg.userData.startTime = performance.now() * 0.001;
                const segments = 8;
                const pts = [p1.clone()];
                for (let i = 1; i < segments; i++) {
                    const t = i / segments;
                    const pt = new THREE.Vector3().lerpVectors(p1, p2, t);

                        p[i * 3 + 2] = d[i].baseZ + (Math.random() - 0.5) * 2; }
                }
                rain.geometry.attributes.position.needsUpdate = true;
            }
            wg.children.forEach(r => { const s = r.userData.baseScale + Math.sin(time * 0.001 * r.userData.speed + r.userData
                    .phase) * 0.15;
                r.scale.setScalar(s);
                r.material.opacity = 0.3 + Math.sin(time * 0.002 + r.userData.phase) * 0.15; });
            if (pg?.userData.update) pg.userData.update(time);
            const pulse = Math.sin(time * 0.001) * 0.2 + 0.8;
            pl1.intensity = 30 * pulse;
            pl2.intensity = 20 * (1.2 - pulse);
            if (ar2) mc.rotation.y += 0.3 * dt;
            else if (!idr) { mc.rotation.y += rv.y;
                mc.rotation.x += rv.x;
                rv.y *= 0.95;
                rv.x *= 0.95; }
            const glows = mc.userData.cornerGlows;
            if (glows) { const p = Math.sin(time * 0.003) * 0.3 + 0.7;
                glows.forEach(g => g.material.opacity = mesoMode ? p * 0.6 : p); }
            if (mc.userData.outerEdge) mc.userData.outerEdge.material.opacity = 0.25 + Math.sin(time * 0.002) * 0.1;
            comp.render();
        }
        animate.lt = performance.now();
        init().then(() => {
            requestAnimationFrame(animate);
            document.addEventListener('click', () => { if (ac && !bgMusic) startBgMusic(); }, { once: true });
        });
    </script>
</body>
